<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    <title>Basketball Scoreboard</title>
</head>
<body>
    <div class="container">
        <div>
            <h3>HOME</h3>
            <p id="home-score">0</p>
            <button id="one" onclick="addOne()">+1</button>
            <button id="two" onclick="addTwo()">+2</button>
            <button id="three" onclick="addThree()">+3</button>
        </div>
        <div>
            <button id="reset" onclick="reset()">Reset</button>
        </div>
        <div>
            <h3>Away</h3>
            <p id="guest-score">0</p>
            <button id="add-one" onclick="add1()">+1</button>
            <button id="add-two" onclick="add2()">+2</button>
            <button id="add-three" onclick="add3()">+3</button>
        </div>
        
    </div>
    <script src="index.js"></script>
</body>
</html>
